<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar"><a href="/">首页</a></div>
<section class="hero"><div class="container"><h1>linkx.club</h1><p class="tagline">东南亚地缘分析 · 中资出海 · 投资决策</p><p id="hero-tags" style="font-size:.9rem;color:#64748b">加载中...</p></div></section>
<div class="container" id="app">
<div class="country-nav" id="country-nav">加载中...</div>
<p class="section-title">🌟 最新专题</p>
<div class="featured-grid" id="featured-grid"><p style="color:#64748b;padding:20px;text-align:center">加载中...</p></div>
<p class="section-title">📡 系列专题</p>
<div class="article-grid" id="article-grid"><p style="color:#64748b;padding:20px;text-align:center">加载中...</p></div>
</div>
<footer class="site-footer"><div class="container"><p>&copy; 2026 linkx.club — 东南亚地缘分析</p></div></footer>
<script>
(async function(){
  const cFlags = {vn:'🇻🇳',th:'🇹🇭',my:'🇲🇾',sg:'🇸🇬',kh:'🇰🇭'};
  const cNames = {vn:'越南',th:'泰国',my:'马来西亚',sg:'新加坡',kh:'柬埔寨'};
  const cBorders = {vn:'#dc2626',th:'#2563eb',my:'#ca8a04',sg:'#7c3aed',kh:'#059669'};
  const cTxtCols = {vn:'#fca5a5',th:'#93c5fd',my:'#fde68a',sg:'#c4b5fd',kh:'#6ee7b7'};
  const cBgCols = {vn:'#dc262622',th:'#2563eb22',my:'#ca8a0422',sg:'#7c3aed22',kh:'#05966922'};

  try {
    const res = await fetch('/api/articles');
    const articles = await res.json();
    articles.sort((a,b) => b.id - a.id);

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    articles.forEach(a => {
      const el = document.createElement('a');
      el.href = '/article/' + a.id;
      el.textContent = (cFlags[a.country]||'🌏') + ' ' + (a.country_name||a.country.toUpperCase()) + '·' + (a.tag||'');
      sidebar.appendChild(el);
    });

    // Hero tags
    document.getElementById('hero-tags').textContent = articles.map(a => (cFlags[a.country]||'🌏') + ' ' + (a.country_name||a.country.toUpperCase())).join(' · ');

    // Country nav
    const nav = document.getElementById('country-nav');
    nav.innerHTML = '';
    articles.forEach(a => {
      const el = document.createElement('a');
      el.href = '/article/' + a.id;
      el.className = 'country-btn';
      el.style.borderColor = cBorders[a.country]||'#334155';
      el.style.color = cTxtCols[a.country]||'#94a3b8';
      el.textContent = (cFlags[a.country]||'🌏') + ' ' + (a.country_name||a.country.toUpperCase()) + ' — ' + (a.tag||'');
      nav.appendChild(el);
    });

    // Featured (first 2)
    const fGrid = document.getElementById('featured-grid');
    fGrid.innerHTML = '';
    if (articles[0]) {
      const a = articles[0];
      const card = document.createElement('a');
      card.href = '/article/' + a.id;
      card.className = 'card-lg';
      card.style.borderColor = cBorders[a.country]||'#3b82f6';
      card.style.position = 'relative';
      card.innerHTML = '<span class="tag" style="background:' + (cBgCols[a.country]||'#334155') + ';color:' + (cTxtCols[a.country]||'#94a3b8') + '">' + (cFlags[a.country]||'🌏') + ' ' + (a.country_name||a.country.toUpperCase()) + ' · ' + (a.tag||'') + '</span><h3>' + a.title + '</h3><p>' + (a.description||'') + '</p>';
      fGrid.appendChild(card);
    }
    if (articles[1]) {
      const a = articles[1];
      const card = document.createElement('a');
      card.href = '/article/' + a.id;
      card.className = 'card';
      card.innerHTML = '<span class="tag" style="background:' + (cBgCols[a.country]||'#334155') + ';color:' + (cTxtCols[a.country]||'#94a3b8') + '">' + (cFlags[a.country]||'🌏') + ' ' + (a.country_name||a.country.toUpperCase()) + ' · ' + (a.tag||'') + '</span><h3>' + a.title + '</h3><p>' + (a.description||'').slice(0,70) + '...</p>';
      fGrid.appendChild(card);
    }

    // Grid (rest)
    const grid = document.getElementById('article-grid');
    grid.innerHTML = '';
    for (let i = 2; i < articles.length; i++) {
      const a = articles[i];
      const card = document.createElement('a');
      card.href = '/article/' + a.id;
      card.className = 'card';
      card.innerHTML = '<span class="tag" style="background:' + (cBgCols[a.country]||'#334155') + ';color:' + (cTxtCols[a.country]||'#94a3b8') + '">' + (cFlags[a.country]||'🌏') + ' ' + (a.country_name||a.country.toUpperCase()) + ' · ' + (a.tag||'') + '</span><h3>' + a.title + '</h3><p>' + (a.description||'').slice(0,70) + '...</p>';
      grid.appendChild(card);
    }
  } catch(e) {
    document.getElementById('featured-grid').innerHTML = '<p style="color:#64748b;padding:20px">加载失败，请刷新重试</p>';
  }
})();
</script>
</body>

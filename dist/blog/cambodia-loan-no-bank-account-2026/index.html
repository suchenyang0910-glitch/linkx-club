        <h1>在柬埔寨没有银行账户，怎么借钱？
        <p class="meta">2026-05-21 · LinkX 金融研究团队</p>
        <p>很多刚到柬埔寨的外国人、或者短期在柬工作的人，都会遇到一个问题：<strong>没有柬埔寨银行账户（ABA、ACLEDA），急用钱了怎么办？</strong></p>
<p>2026 年，柬埔寨的金融科技已经发展到了不需要银行账户也能借钱的程度。这篇文章整理了几种不需要银行账户就能申请的小额借贷方式，从利率、额度、速度到真实避坑经验。</p>
<blockquote>
<p><strong>核心结论：</strong> 没有银行账户也能借到 $100-3,000。最快的方式是 Wing 贷款（已有 Wing App 用户，即时到账）和 P2P 借贷平台。月利率 2-5%，远低于街边高利贷的 20-30%。</p>
</blockquote>
<h2 id="柬埔寨无银行账户借贷方式对比">柬埔寨无银行账户借贷方式对比</h2>








































<table><thead><tr><th>平台/方式</th><th>需要什么</th><th align="center">额度</th><th align="center">月利率</th><th align="center">到账时间</th></tr></thead><tbody><tr><td><strong>Wing 贷款</strong></td><td>Wing App + 身份证/护照</td><td align="center">$100-2,000</td><td align="center">3-5%</td><td align="center">即时-24h</td></tr><tr><td><strong>TrueMoney 贷款</strong></td><td>TrueMoney App + 护照</td><td align="center">$50-1,000</td><td align="center">4-6%</td><td align="center">即时</td></tr><tr><td><strong>P2P 借贷平台</strong></td><td>护照 + 工作证明/押金</td><td align="center">$200-3,000</td><td align="center">2-4%</td><td align="center">1-24h</td></tr><tr><td><strong>朋友/同事间借贷</strong></td><td>信任 + 借条</td><td align="center">双方商定</td><td align="center">0%</td><td align="center">协商</td></tr></tbody></table>
<h2 id="一wing-贷款最适合已有-wing-用户">一、Wing 贷款（最适合已有 Wing 用户）</h2>
<p>Wing 是柬埔寨最大的本土金融科技公司，2026 年活跃用户超过 800 万。Wing 贷款不需要银行账户，只要下载 Wing App 就能申请。</p>
<ul>
<li><strong>申请条件：</strong> 年满 18 岁，持有护照或柬埔寨身份证。Wing App 注册满 3 个月以上有更高通过率。</li>
<li><strong>额度：</strong> 首次 $100-500，按时还款后可提升至 $2,000。</li>
<li><strong>利率：</strong> 月息 3-5%（年化 36-60%），根据信用评估浮动。</li>
<li><strong>到账：</strong> 审核通过后即时到 Wing 钱包。提现到 ABA 可能需要 1 小时。</li>
<li><strong>还款：</strong> 通过 Wing 网点或 App 还款，支持分期（最长 6 个月）。</li>
<li><strong>注意：</strong> Wing 贷款查柬埔寨信用局（CBC）报告，有逾期记录可能被拒。</li>
</ul>
<h2 id="二truemoney-贷款最快额度最小">二、TrueMoney 贷款（最快，额度最小）</h2>
<p>TrueMoney 在柬埔寨和泰国都有运营，2026 年在柬用户快速扩张。它的贷款产品是最易申请的，但也最贵。</p>
<ul>
<li><strong>申请条件：</strong> 有 TrueMoney App 和实名认证的柬埔寨手机号（Cellcard/Smart/Metfone 均可）。</li>
<li><strong>额度：</strong> $50-1,000。首次一般只有 $100 额度。</li>
<li><strong>利率：</strong> 周息 1-1.5%（相当于月息 4-6%），借款周期短（7-30 天）。</li>
<li><strong>到账：</strong> TrueMoney 用户之间即时到账，秒到。</li>
<li><strong>适合：</strong> 临时周转，短期借几百美金应急。</li>
<li><strong>风险：</strong> 短期借款利息滚得快，借 $200 一个月可能要还 $220-230。</li>
</ul>
<blockquote>
<p>⚠️ 短期贷款的利息看起来低（周息 1%），但年化利率可能高达 50-80%。只建议借 7-14 天的超短期周转，不建议长期滚动借款。</p>
</blockquote>
<h2 id="三p2p-借贷平台额度最高最灵活">三、P2P 借贷平台（额度最高，最灵活）</h2>
<p>P2P（点对点借贷）2025-2026 年在柬埔寨快速发展，连接有闲置资金的出借人和需要小额借款的借款人。对没有银行账户的人来说，这是额度最高、利率最低的选择。</p>
<ul>
<li><strong>常见平台：</strong> KhmerX、小额贷 668、iMoney。</li>
<li><strong>申请条件：</strong> 护照、3 个月以上柬埔寨手机号、工作证明（或押金）。部分平台接受外国人。</li>
<li><strong>额度：</strong> $200-3,000，有抵押品可更高。</li>
<li><strong>利率：</strong> 月息 2-4%（年化 24-48%），比 Wing 和 TrueMoney 便宜。</li>
<li><strong>到账：</strong> 审核通过后通过 ABA 转账到你的 ABA 账户，或出借人与你约定转账方式。</li>
<li><strong>灵活度：</strong> 分期 1-12 个月，支持提前还款（部分平台免提前还款费）。</li>
</ul>
<blockquote>
<p>⚠️ 柬埔寨 P2P 借贷市场仍在快速发展中，选择平台务必确认其是否在国家银行（NBC）注册。<a href="https://t.me/khmerx_bot">KhmerX</a> 是金边华人社区使用较多的平台，支持 ABA 绑定和 Tg Bot 全流程操作。</p>
</blockquote>
<h2 id="四注意事项和避坑指南">四、注意事项和避坑指南</h2>
<h3 id="这些坑千万别踩">这些坑千万别踩</h3>
<ul>
<li><strong>日息放贷（Daily Loan）：</strong> 柬埔寨很多小额贷公司打广告”日息 0.5%“，听起来低，但年化是 182.5%！遇到日息放贷直接绕道。</li>
<li><strong>押护照：</strong> 任何要求押护照的借贷都不要碰。正规小额贷款只需护照复印件或照片。</li>
<li><strong>超高额度承诺：</strong> 没有银行账户、没有稳定收入证明，平台上承诺 $5,000+ 额度的基本都是高利贷。</li>
<li><strong>线下 P2P 放贷：</strong> 路边或熟人介绍的不明放贷人，利息可能极高（20%+/月），催收手段也未知。</li>
</ul>
<h3 id="借钱之前先问自己三个问题">借钱之前先问自己三个问题</h3>
<ol>
<li><strong>这笔钱是真的需要，还是只是想要？</strong> 借钱买日用品和借钱买新手机，性质完全不同。</li>
<li><strong>还款计划是什么？</strong> 月收入能覆盖月供 + 生活费吗？</li>
<li><strong>有别的选择吗？</strong> 向朋友借？跟老板预支工资？卖闲置物品？先排除零成本的方案。</li>
</ol>
<h2 id="常见问题faq">常见问题（FAQ）</h2>
<p><strong>问：外国人在柬埔寨能借钱吗？</strong>
可以。Wing 和 TrueMoney 都接受护照注册。P2P 平台如 KhmerX 也支持外国人，需要提供护照和在柬工作证明或押金。</p>
<p><strong>问：没有工作能借到钱吗？</strong>
很难。正规平台都需要收入来源证明（工资单、自雇收入流水）。没有稳定收入只能降低额度（$100-300）或找有 ABA 账户的朋友做担保。</p>
<p><strong>问：逾期了会怎么样？</strong>
短期逾期（1-7 天）一般收滞纳金（日息 0.5-1%）。超过 30 天未还，平台会上报信用局（CBC），影响未来在柬埔寨的贷款和办手机卡。</p>
<p><strong>问：柬埔寨的利息为什么这么高？</strong>
柬埔寨是小额信贷高风险市场，没有完善的个人征信系统，违约率比发达国家高。年化 24-60% 是合法的民间借贷利率区间（国家银行规定民间借贷年化上限为 60%）。</p>
<p><strong>问：有没有利息更低的官方渠道？</strong>
开立 ABA 或 ACLEDA 银行账户后，可以申请正规消费贷或抵押贷，年化约 12-18%。短期来看，办个银行账户是降低借贷成本的最好方式。</p>

        <h1>金边二手车市场：从这 5 个渠道开始淘
        <p class="meta">2026-05-02 · 路飞</p>
        <p>在金边，买新车？土豪请便。对多数人来说，二手车才是务实的路。</p>
<p>我在金边住了几年，换了两次车（陆巡 4.7 V8 自用 + 雷克萨斯 250H 出租），踩过坑也捡过漏。这篇把金边二手车的主流渠道梳理清楚。</p>
<hr>
<h2 id="1-facebook-marketplace--最活跃但水最深">1. Facebook Marketplace — 最活跃，但水最深</h2>
<p>柬埔寨最大的二手车交易平台就是 <strong>Facebook Marketplace</strong>。没有之一。</p>
<p><strong>优点：</strong></p>
<ul>
<li>车源最多，从 $1,000 的老爷车到 $100K+ 的豪车都有</li>
<li>直接跟车主聊，没有中间商</li>
<li>按区域搜索方便（Phnom Penh → 筛选）</li>
</ul>
<p><strong>缺点：</strong></p>
<ul>
<li>假车主、假车况太多</li>
<li>图片 PS 过的卖家占一半以上</li>
<li>很多是车行伪装成个人车源</li>
</ul>
<p><strong>实用技巧：</strong></p>
<ul>
<li>只看 <code>Seller > Individual</code> 不选 <code>Dealer</code> → 筛掉 70% 的车行贴</li>
<li>搜 <code>Bien Hoa</code>（柬二手车行常用词）→ 筛掉车行伪装</li>
<li>要求当天视频看车 + 约实地看车时间</li>
<li>总规则：<strong>低于市场价 20% 以上的，99% 是坑或事故车</strong></li>
</ul>
<p><strong>热门搜索词：</strong></p>
<ul>
<li><code>Land Cruiser 200 Phnom Penh</code>（陆巡）</li>
<li><code>Camry 2018</code>（凯美瑞）</li>
<li><code>LEXUS RX330</code> / <code>RX350</code></li>
<li><code>RAV4 2018</code></li>
<li><code>Alphard</code>（保姆车，出租神车）</li>
</ul>
<hr>
<h2 id="2-khmer24--第二选择">2. Khmer24 — 第二选择</h2>
<p><a href="https://www.khmer24.com/en/vehicles/">Khmer24.com</a> 是柬埔寨最大的分类信息站，二手车板块活跃度排第二。</p>
<p><strong>优点：</strong></p>
<ul>
<li>比 Facebook 规范一点（有基本分类 + 联系表单）</li>
<li>可以设价格范围搜索</li>
<li>图片质量普遍比 FB 好</li>
</ul>
<p><strong>缺点：</strong></p>
<ul>
<li>更新速度不如 Facebook</li>
<li>车源量只有 FB 的 1/5 左右</li>
<li>同样有大量车行入驻</li>
</ul>
<p><strong>建议：</strong> Facebook 为主，Khmer24 作为补充对比。</p>
<hr>
<h2 id="3-本地二手车行--省心但贵-10-20">3. 本地二手车行 — 省心但贵 10-20%</h2>
<p>金边大大小小的二手车行没有一百也有八十。集中在 <strong>Russian Market 附近</strong> 和 <strong>街 271（St. 271）沿线</strong>。</p>
<p><strong>知名车行举例：</strong></p>
<ul>
<li><strong>Car4U Cambodia</strong> — 规模最大，车况相对有保障</li>
<li><strong>Auto Export Cambodia</strong> — 日本进口车为主</li>
<li><strong>Khmer Car</strong> — 中低价位车源多</li>
<li><strong>Serey Pich Auto</strong> — 老牌车行</li>
</ul>
<p><strong>价格规律：</strong> 车行报价普遍比 Facebook 个人卖家贵 10-20%。但你买到的是”相对可信的车况”。</p>
<p><strong>砍价空间：</strong> 车行报价砍 10-15% 是正常操作。$20,000 的车，从 $17,500 开始谈。</p>
<hr>
<h2 id="4-日本直接进口--质量最高等最久">4. 日本直接进口 — 质量最高，等最久</h2>
<p>柬埔寨二手车多数来自 <strong>日本二手拍卖</strong>（USS / JU 等平台）。流程：</p>
<ol>
<li>找本地进口商（Google <code>toyota direct import cambodia</code>）</li>
<li>选车 / 给预算和车型要求</li>
<li>等 3-6 周，车从日本运到西港</li>
<li>手续大约再 1-2 周</li>
</ol>
<p><strong>优点：</strong></p>
<ul>
<li>车况透明（日本拍卖有第三方评级报告）</li>
<li>内外干净，没事故记录</li>
<li>比本地车行便宜 5-10%</li>
</ul>
<p><strong>缺点：</strong></p>
<ul>
<li>等 1-2 个月</li>
<li>语言门槛（日本拍卖说明书全日文）</li>
<li>需要靠谱的进口商（踩到不良进口商照样被坑）</li>
</ul>
<p><strong>推荐进口商：</strong></p>
<ul>
<li><strong>BBB Cambodia</strong> — 专注日本直车</li>
<li><strong>Best Car Cambodia</strong> — 中高端为主</li>
<li><strong>Bonna Car</strong> — 性价比不错，老店</li>
</ul>
<hr>
<h2 id="5-朋友圈--社群--最被低估的渠道">5. 朋友圈 / 社群 — 最被低估的渠道</h2>
<p>金边华人圈子不大，<strong>真假消息传得飞快</strong>。</p>
<p><strong>渠道：</strong></p>
<ul>
<li>金边华人微信群（各行业群都有）</li>
<li>金边生活群、二手群、车友群</li>
<li>Telegram 华人频道</li>
</ul>
<p><strong>优点：</strong></p>
<ul>
<li>知根知底，车况敢问</li>
<li>价格实在，没有中间商</li>
<li>谈得来还能分期付</li>
</ul>
<p><strong>操作：</strong></p>
<ul>
<li>在群说一句”想收一台雷克萨斯 RX，预算 $15K-18K”</li>
<li>最多 3 天就有人拉你对</li>
</ul>
<blockquote>
<p>我自己的雷克萨斯 250H 就是从朋友介绍的渠道拿的，比 FB 同款便宜 $2,000。</p>
</blockquote>

<hr>
<h2 id="看车必备-checklist打印出来带">看车必备 checklist（打印出来带）</h2>
<ol>
<li><strong>发动机</strong> — 冷车启动，听有没有异响、怠速稳不稳</li>
<li><strong>变速箱</strong> — D/R 切换是否平顺，急加速有没有顿挫</li>
<li><strong>底盘</strong> — 有没有漏油、锈蚀严重的地方</li>
<li><strong>空调</strong> — 柬埔寨必备，冷风够不够快</li>
<li><strong>仪表盘</strong> — 所有灯亮不亮，里程表有没有动过手脚</li>
<li><strong>事故痕迹</strong> — 看车门缝隙、螺丝有没有拧过痕迹</li>
<li><strong>轮胎磨损</strong> — 不均匀磨损提示定位/悬挂有问题</li>
<li><strong>路试</strong> — 5 公里以上，加速/刹车/转向都试一轮</li>
<li><strong>文件</strong> — 车证（Car Card）、税单、进口文件</li>
<li><strong>查 VIN</strong> — 找本地人帮查事故记录（或付 $5 用 Carfax 类服务）</li>
</ol>
